<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="SHIHT-JIS">
    <meta name="viewport" content="width=deサインインwidth, initial-scale=1.0">
    <title>関数クイズゲーム</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="start-screen" class="screen">
        <h1>Function Guessing Game</h1>
        <button id="start-button">スタート</button>
    </div>

    <div id="select-screen" class="screen hidden">
        <h2>モンスターを選択してください</h2>
        <div id="monster-grid"></div>
        <button id="title-button-select" class="title-button">タイトルに戻る</button>
    </div>

    <div id="game-screen" class="screen hidden">
        <div id="top-info">
            <div id="stage-info">クイズ<span id="current-stage">1</span></div>
            <div id="hp-info">
                <span id="heart-icon">問目 MyHP</span>＝<span id="player-hp">3</span>
            </div>
            <button id="title-button-game" class="title-button">タイトルに戻る</button>
            <button id="select-button-game" class="title-button">セレクト画面に戻る</button>
        </div>
        <div id="game-content">
            <div id="left-side">
                <div id="monster-container">
                    <div id="monster-image"></div>
                    <div id="monster-hp">モンスターHP: <span id="monster-hp-value">10</span></div>
                </div>
                <div id="choices-list"></div>
            </div>
            <div id="right-side">
                <div id="graph-container">
                    <canvas id="graph" width="400" height="300"></canvas>
                </div>
            </div>
        </div>
        <div id="question">Q.右図の関数式は次のうちどれ？</div>
        <div id="feedback"></div>
    </div>

    <div id="end-screen" class="screen hidden">
        <h1 id="end-message"></h1>
        <div id="end-buttons">
            <button id="title-button-end">タイトルに戻る</button>
            <button id="select-button-end">セレクト画面に戻る</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
